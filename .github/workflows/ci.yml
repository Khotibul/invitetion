name: CI — Lint & Test

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. PHP Lint — cek syntax error semua file PHP
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo, pdo_pgsql, gd, exif, fileinfo, mbstring, openssl, tokenizer, xml, ctype, json, bcmath
          coverage: none

      - name: Check PHP syntax
        run: |
          find app bootstrap config database routes -name "*.php" \
            | xargs -P4 -I{} php -l {} \
            | grep -v "No syntax errors" \
            | tee /tmp/lint-errors.txt
          if [ -s /tmp/lint-errors.txt ]; then
            echo "❌ PHP syntax errors found!"
            exit 1
          fi
          echo "✅ No PHP syntax errors."

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Tests — PHPUnit dengan PostgreSQL
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo, pdo_pgsql, pdo_sqlite, gd, exif, fileinfo, mbstring, openssl, tokenizer, xml, ctype, json, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies (dev)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Create .env.testing
        run: |
          cat > .env.testing << 'EOF'
          APP_NAME="Risa Digital Invitation"
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=testing
          DB_USERNAME=testing
          DB_PASSWORD=testing
          CACHE_DRIVER=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          FILESYSTEM_DISK=local
          EOF

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run PHPUnit tests
        run: php artisan test --env=testing --stop-on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Code Style — Laravel Pint (warning only, tidak block merge)
  # ─────────────────────────────────────────────────────────────────────────────
  pint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Laravel Pint (dry-run)
        run: vendor/bin/pint --test
