name: Rollback — Kembali ke Release Sebelumnya

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Nama release tujuan (kosongkan = release sebelumnya)"
        required: false
        default: ""

jobs:
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://invitation.wahid-elektronik.online

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config << EOF
          Host proxmox-server
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            Port ${{ secrets.SSH_PORT || '22' }}
            StrictHostKeyChecking no
          EOF

      - name: Execute rollback
        env:
          TARGET_RELEASE: ${{ github.event.inputs.release }}
        run: |
          ssh proxmox-server bash << ENDSSH
          set -e
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          CURRENT_PATH="\${DEPLOY_PATH}/current"

          echo "=== Daftar release tersedia ==="
          ls -1t "\${DEPLOY_PATH}/releases/"

          # Tentukan target release
          if [ -n "${TARGET_RELEASE}" ]; then
            TARGET="\${DEPLOY_PATH}/releases/${TARGET_RELEASE}"
          else
            # Ambil release kedua terbaru (sebelum yang aktif)
            CURRENT_RELEASE=\$(readlink -f "\${CURRENT_PATH}" | xargs basename)
            TARGET="\${DEPLOY_PATH}/releases/\$(ls -1t "\${DEPLOY_PATH}/releases/" | grep -v "\${CURRENT_RELEASE}" | head -1)"
          fi

          if [ ! -d "\${TARGET}" ]; then
            echo "❌ Release tidak ditemukan: \${TARGET}"
            exit 1
          fi

          echo "=== Rollback ke: \$(basename \${TARGET}) ==="

          # Aktifkan maintenance
          cd "\${CURRENT_PATH}" && php artisan down --retry=5 || true

          # Atomic symlink swap
          ln -sfn "\${TARGET}" "\${DEPLOY_PATH}/current_rollback"
          mv -Tf "\${DEPLOY_PATH}/current_rollback" "\${CURRENT_PATH}"

          # Nonaktifkan maintenance
          cd "\${CURRENT_PATH}" && php artisan up || true

          # Reload PHP-FPM
          sudo systemctl reload php8.1-fpm 2>/dev/null \
            || sudo systemctl reload php-fpm 2>/dev/null \
            || true

          echo "✅ Rollback selesai ke: \$(basename \${TARGET})"
          ENDSSH

      - name: Verify rollback
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            https://invitation.wahid-elektronik.online)
          echo "HTTP Status setelah rollback: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] && echo "✅ OK" || echo "⚠️  Cek manual"
